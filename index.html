<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boundaries Coffee | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #09090b; color: #f4f4f5; }
        .brand-font { font-family: 'Playfair Display', serif; }
        .glass-card {
            background: #111113;
            border: 1px solid #1e1e23;
            box-shadow: 0 0 0 0 transparent;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .glass-card:hover {
            border-color: #27272a;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.04);
        }
        .glow-left {
            position: relative;
            overflow: hidden;
        }
        .glow-left::before {
            content: '';
            position: absolute;
            top: 12px;
            bottom: 12px;
            left: 0;
            width: 2px;
            background: linear-gradient(180deg, #3b82f6, #6366f1);
            border-radius: 1px;
            box-shadow: 0 0 8px rgba(59, 130, 246, 0.4);
        }
        .glow-top {
            position: relative;
            overflow: hidden;
        }
        .glow-top::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, #3b82f6, transparent);
            opacity: 0.6;
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            50% { box-shadow: 0 0 0 4px rgba(34, 197, 94, 0); }
        }
        .pulse-glow { animation: pulse-glow 2s infinite; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #09090b; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
    </style>
</head>
<body class="bg-[#09090b]">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
